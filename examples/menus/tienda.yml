# ============================================================
#  EJEMPLO 06b — TIENDA DE PUNTOS
#  El jugador gasta puntos a cambio de ítems o rangos.
#  Los puntos se guardan en la variable {var:puntos}.
# ============================================================
# Uso: [MENU] tienda  (desde otro menú o /tienda)

title: "&2&l💰 Tienda de Puntos"
rows: 4    # 36 slots
# Solo jugadores con el nodo fccmds.menus.tienda pueden abrirla.
# El nodo se registra automáticamente; asígnalo en LuckPerms.
permission: "fccmds.menus.tienda"

items:

  # ── Decoración perimetral ────────────────────────────────
  0:  { material: GREEN_STAINED_GLASS_PANE, name: " " }
  1:  { material: GREEN_STAINED_GLASS_PANE, name: " " }
  2:  { material: GREEN_STAINED_GLASS_PANE, name: " " }
  3:  { material: GREEN_STAINED_GLASS_PANE, name: " " }
  4:  { material: GREEN_STAINED_GLASS_PANE, name: " " }
  5:  { material: GREEN_STAINED_GLASS_PANE, name: " " }
  6:  { material: GREEN_STAINED_GLASS_PANE, name: " " }
  7:  { material: GREEN_STAINED_GLASS_PANE, name: " " }
  8:  { material: GREEN_STAINED_GLASS_PANE, name: " " }
  9:  { material: GREEN_STAINED_GLASS_PANE, name: " " }
  17: { material: GREEN_STAINED_GLASS_PANE, name: " " }
  18: { material: GREEN_STAINED_GLASS_PANE, name: " " }
  26: { material: GREEN_STAINED_GLASS_PANE, name: " " }
  27: { material: GREEN_STAINED_GLASS_PANE, name: " " }
  28: { material: GREEN_STAINED_GLASS_PANE, name: " " }
  29: { material: GREEN_STAINED_GLASS_PANE, name: " " }
  30: { material: GREEN_STAINED_GLASS_PANE, name: " " }
  31: { material: GREEN_STAINED_GLASS_PANE, name: " " }
  32: { material: GREEN_STAINED_GLASS_PANE, name: " " }
  33: { material: GREEN_STAINED_GLASS_PANE, name: " " }
  34: { material: GREEN_STAINED_GLASS_PANE, name: " " }
  35: { material: GREEN_STAINED_GLASS_PANE, name: " " }

  # ── Mostrador de saldo ───────────────────────────────────
  4:
    material: GOLD_NUGGET
    name: "&eTus puntos: &6&l{var:puntos}"
    lore:
      - "&7Gana puntos jugando,"
      - "&7votando o participando"
      - "&7en eventos."
    close-on-click: false
    actions: []   # solo informativo, sin acción

  # ── Producto 1: Diamantes (50 pts) ───────────────────────
  10:
    material: DIAMOND
    name: "&b&l3 Diamantes"
    lore:
      - "&7Precio: &e50 puntos"
      - "&7Tus puntos: &e{var:puntos}"
      - ""
      - "&aClick para comprar"
    glow: true
    close-on-click: false
    actions:
      - "[IF] var:puntos>=50;[VAR:ADD] puntos -50;[MESSAGE] &cNo tienes suficientes puntos (necesitas 50)."
      - "[IF] var:puntos>=0;[CONSOLE] give {player} diamond 3"
      - "[IF] var:puntos>=0;[MESSAGE] &aCompraste 3 diamantes. Puntos restantes: &e{var:puntos}"
      - "[IF] var:puntos>=0;[SOUND] ENTITY_EXPERIENCE_ORB_PICKUP"

  # ── Producto 2: Tótem (150 pts) ──────────────────────────
  12:
    material: TOTEM_OF_UNDYING
    name: "&6&lTótem de Inmortalidad"
    lore:
      - "&7Precio: &e150 puntos"
      - "&7Tus puntos: &e{var:puntos}"
      - ""
      - "&aClick para comprar"
    glow: true
    close-on-click: false
    actions:
      - "[IF] var:puntos>=150;[VAR:ADD] puntos -150;[MESSAGE] &cNecesitas 150 puntos."
      - "[IF] var:puntos>=0;[CONSOLE] give {player} totem_of_undying 1"
      - "[IF] var:puntos>=0;[SOUND] ENTITY_PLAYER_LEVELUP"
      - "[IF] var:puntos>=0;[MESSAGE] &6¡Compraste un Tótem! Puntos: &e{var:puntos}"

  # ── Producto 3: Rango VIP (500 pts) ──────────────────────
  14:
    material: NETHER_STAR
    name: "&d&lRango VIP"
    lore:
      - "&7Precio: &e500 puntos"
      - "&7Tus puntos: &e{var:puntos}"
      - ""
      - "&7Obtendrás el rango VIP"
      - "&7de forma permanente."
      - ""
      - "[IF ya eres VIP no aparece nada]"
      - "&aClick para comprar"
    glow: true
    close-on-click: true
    actions:
      - "[IF] var:rango=VIP;[MESSAGE] &cYa eres VIP.;"
      - "[IF] var:puntos>=500;[VAR:ADD] puntos -500;[MESSAGE] &cNecesitas 500 puntos."
      - "[IF] var:puntos>=0;[VAR:SET] rango VIP"
      - "[IF] var:rango=VIP;[CONSOLE] lp user {player} parent set vip"
      - "[IF] var:rango=VIP;[BROADCAST] &d★ &f{player} &dacabó de ascender a &d&lVIP&d ★"
      - "[IF] var:rango=VIP;[TITLE] &d&lVIP;&7¡Felicitaciones!;10;60;10"
      - "[IF] var:rango=VIP;[SOUND] UI_TOAST_CHALLENGE_COMPLETE"

  # ── Botón inferior: Volver al panel ──────────────────────
  31:
    material: ARROW
    name: "&7← Volver al panel"
    close-on-click: false
    actions:
      - "[MENU] panel"
