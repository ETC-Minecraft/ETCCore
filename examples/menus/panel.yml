# ============================================================
#  EJEMPLO 06 — MENÚ PRINCIPAL
#  Un panel de navegación con botones para los sistemas
#  del servidor (kits, tienda, perfil, reglas)
# ============================================================
# Ubicación: plugins/FoliaCustomCommands/menus/panel.yml
# Apertura:  /panel  (comando declarado en commands/panel-cmd.yml)

title: "&8⬛ &6&lPANEL PRINCIPAL &8⬛"
rows: 3      # 27 slots (3 filas × 9 columnas)
# permission: ""   ← vacío = cualquier jugador puede abrir este menú
#
# Si quisieras restringirlo:
#   permission: fccmds.menus.panel
# (el nodo fccmds.menus.panel se registra automáticamente en LuckPerms)

items:

  # ── Fila 0: Decoración ──────────────────────────────────
  0:
    material: BLACK_STAINED_GLASS_PANE
    name: " "

  1:
    material: BLACK_STAINED_GLASS_PANE
    name: " "

  2:
    material: BLACK_STAINED_GLASS_PANE
    name: " "

  6:
    material: BLACK_STAINED_GLASS_PANE
    name: " "

  7:
    material: BLACK_STAINED_GLASS_PANE
    name: " "

  8:
    material: BLACK_STAINED_GLASS_PANE
    name: " "

  # ── Slot 3: Kit diario ───────────────────────────────────
  3:
    material: CHEST
    name: "&e&lKit Diario"
    lore:
      - "&7Recibe tu kit de recursos"
      - "&7una vez cada &e24 horas&7."
      - ""
      - "&aClick para reclamar"
    glow: true
    close-on-click: true
    actions:
      - "[PLAYER] kit-diario"

  # ── Slot 4: Tienda ───────────────────────────────────────
  4:
    material: EMERALD
    name: "&a&lTienda"
    lore:
      - "&7Gasta tus puntos en"
      - "&7recompensas y rangos."
      - ""
      - "&aTus puntos: &e{var:puntos}"
      - ""
      - "&aClick para abrir"
    glow: true
    close-on-click: false   # al hacer clic abrirá otro menú
    actions:
      - "[MENU] tienda"

  # ── Slot 5: Perfil ───────────────────────────────────────
  5:
    material: PLAYER_HEAD
    name: "&b&lMi Perfil"
    lore:
      - "&7Jugador: &f{player}"
      - "&7Rango: &6{var:rango}"
      - "&7Puntos: &e{var:puntos}"
      - ""
      - "&aClick para ver detalles"
    close-on-click: true
    actions:
      - "[PLAYER] mi-perfil"

  # ── Fila 1: Slots centrales ──────────────────────────────
  9:
    material: BLACK_STAINED_GLASS_PANE
    name: " "

  17:
    material: BLACK_STAINED_GLASS_PANE
    name: " "

  # ── Slot 11: Reglas del servidor ────────────────────────
  11:
    material: BOOK
    name: "&f&lReglamento"
    lore:
      - "&7Lee las normas del servidor"
      - "&7antes de jugar."
    close-on-click: true
    actions:
      - "[PLAYER] reglas"

  # ── Slot 13: Discord / Redes ─────────────────────────────
  13:
    material: MAP
    name: "&9&lDiscord & Redes"
    lore:
      - "&7discord.gg/miservidor"
      - "&7instagram: @miservidor"
    close-on-click: true
    actions:
      - "[MESSAGE] &9Discord: &fdiscord.gg/miservidor"
      - "[MESSAGE] &dInstagram: &f@miservidor"

  # ── Slot 15: Soporte ─────────────────────────────────────
  15:
    material: WRITABLE_BOOK
    name: "&c&lAbrir Ticket"
    lore:
      - "&7¿Tienes un problema?"
      - "&7Un staff te ayudará."
    close-on-click: true
    actions:
      - "[PLAYER] ticket"

  # ── Fila 2: Decoración inferior + cerrar ─────────────────
  18:
    material: BLACK_STAINED_GLASS_PANE
    name: " "

  19:
    material: BLACK_STAINED_GLASS_PANE
    name: " "

  20:
    material: BLACK_STAINED_GLASS_PANE
    name: " "

  24:
    material: BLACK_STAINED_GLASS_PANE
    name: " "

  25:
    material: BLACK_STAINED_GLASS_PANE
    name: " "

  26:
    material: BLACK_STAINED_GLASS_PANE
    name: " "

  # ── Slot 22: Cerrar ──────────────────────────────────────
  22:
    material: BARRIER
    name: "&c&lCerrar"
    close-on-click: true
    actions:
      - "[CLOSE]"
