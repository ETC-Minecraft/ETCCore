# ============================================================
#   Menu principal — menu.yml
# ============================================================
#
# Se abre con /menu (definido en commands/menu.yml).
#
# Cada item puede ejecutar cualquier accion estandar de ETCCore:
#   [CONSOLE] cmd        [PLAYER] cmd        [MESSAGE] texto
#   [MENU] otro_menu     [SOUND] NOMBRE      [TITLE] titulo;sub
#   [PAPI] %placeholder%
#
# Ademas, los SUBMENUS DINAMICOS internos se abren con:
#   [ETCMENU] mundos        — lista de mundos visibles (paginada)
#   [ETCMENU] pocketworlds  — propio + invitados
#   [ETCMENU] homes         — homes con LMB=tp, RMB=mover, Q=borrar
#   [ETCMENU] warps         — warps publicos
#   [ETCMENU] tpa           — solicitudes TPA pendientes
#   [ETCMENU] stats         — estadisticas del jugador
#   [ETCMENU] top           — top jugadores por playtime
#   [ETCMENU] pvp           — toggle PvP personal (sin GUI)
#
# Estos submenus son dinamicos (datos en tiempo real) y NO son YAML.
# Recarga: /etccore reload
# ============================================================

