# ============================================================
#   Menú de ejemplo — panel.yml
# ============================================================
#
# Panel de navegación principal del servidor.
# Ábrase con:  [MENU] panel   (desde cualquier acción de comando YAML)
#
# Diseño (4 filas = 36 slots):
#
#   [ ][ ][ ][ ][ ][ ][ ][ ][ ]   ← fila 0: borde superior
#   [ ] SP  ES  KIT TDA PER REG [ ]   ← fila 1: botones principales
#   [ ] TKT          CER         [ ]   ← fila 2: ticket + cerrar
#   [ ][ ][ ][ ][ ][ ][ ][ ][ ]   ← fila 3: borde inferior
#
# Recarga:  /fccmds reload
# ============================================================

title: "&8⬛ &6&lPANEL PRINCIPAL &8⬛"
