name: ETCCore
version: ${project.version}
main: com.etcmc.etccore.ETCCore
api-version: "1.21"
folia-supported: true
description: Plugin base para servidores Minecraft — comandos YAML, GUIs, variables, protección, mute y más.
author: EmmanuelTC
website: https://github.com/ETC-Minecraft/ETCCore
soft-depend: [LuckPerms, PlaceholderAPI, Vault, floodgate, ETCWorlds]

commands:
  etccore:
    description: Administración de ETCCore
    usage: /etccore <reload|onlinemode>
    aliases: [etccore, ecc]
    permission: etccore.admin
  enderchest:
    description: Abre tu enderchest o el de otro jugador
    usage: /enderchest [jugador]
    permission: etccore.enderchest
  invsee:
    description: Ve y edita el inventario de otro jugador (online u offline)
    usage: /invsee <jugador>
    permission: etccore.invsee
  mute:
    description: Silencia a un jugador (temporal o permanente)
    usage: /mute <jugador> [duración] [razón]
    permission: etccore.mute
  unmute:
    description: Quita el silencio a un jugador
    usage: /unmute <jugador>
    permission: etccore.mute
  vanish:
    description: Activa o desactiva el vanish de un jugador
    usage: /vanish [jugador]
    permission: etccore.vanish
  home:
    description: Teletransporte a homes propios
    usage: /home [nombre]
    aliases: [homes, homelist]
    permission: etccore.home
  sethome:
    description: Guarda o edita un home
    usage: /sethome <nombre>
    aliases: [edithome]
    permission: etccore.sethome
  delhome:
    description: Elimina un home propio
    usage: /delhome <nombre>
    permission: etccore.delhome
  publichome:
    description: Gestiona o visita public homes
    usage: /publichome <jugador> <home>
    permission: etccore.publichome
  publichomelist:
    description: Lista public homes
    usage: /publichomelist [jugador]
    permission: etccore.publichome
  warp:
    description: Teletransporte a warps
    usage: /warp [nombre]
    aliases: [warps, warplist]
    permission: etccore.warp
  setwarp:
    description: Crea o edita warps
    usage: /setwarp <nombre>
    aliases: [editwarp]
    permission: etccore.warp.manage
  delwarp:
    description: Elimina warps
    usage: /delwarp <nombre>
    permission: etccore.warp.manage
  lobby:
    description: Teletransporte al lobby
    usage: /lobby
    permission: etccore.lobby
  setlobby:
    description: Define el lobby
    usage: /setlobby
    permission: etccore.lobby.set
  spawn:
    description: Teletransporte al spawn
    usage: /spawn
    permission: etccore.spawn
  setspawn:
    description: Define el spawn
    usage: /setspawn
    permission: etccore.spawn.set
  back:
    description: Vuelve a tu última ubicación
    usage: /back
    permission: etccore.back
  reborn:
    description: Vuelve a una de tus últimas muertes
    usage: /reborn [indice]
    aliases: [arise, renacer, muerte, death]
    permission: etccore.reborn
  deathlist:
    description: Lista tus últimas muertes guardadas
    usage: /deathlist
    aliases: [muertelist, deaths]
    permission: etccore.reborn
  rtp:
    description: Teletransporte aleatorio seguro
    usage: /rtp
    permission: etccore.rtp
  tp:
    description: Teletransporte administrativo
    usage: /tp <jugador> [jugador]
    permission: etccore.tpadmin
  tpo:
    description: Teletransporte administrativo directo
    usage: /tpo <jugador> [jugador]
    permission: etccore.tpadmin
  tphere:
    description: Trae a un jugador hacia ti
    usage: /tphere <jugador>
    permission: etccore.tpadmin
  tpohere:
    description: Trae a un jugador hacia ti sin restricciones
    usage: /tpohere <jugador>
    permission: etccore.tpadmin
  tpall:
    description: Teletransporta a todos los jugadores
    usage: /tpall [jugador]
    permission: etccore.tpadmin
  tpoffline:
    description: Te lleva a la última ubicación offline conocida
    usage: /tpoffline <jugador>
    permission: etccore.tpadmin
  tpa:
    description: Solicita ir hacia otro jugador
    usage: /tpa <jugador>
    permission: etccore.tpa
  tpahere:
    description: Solicita que otro jugador vaya hacia ti
    usage: /tpahere <jugador>
    permission: etccore.tpa
  tpaall:
    description: Solicita a todos que vayan hacia ti
    usage: /tpaall
    permission: etccore.tpaall
  tpaccept:
    description: Acepta una solicitud de teletransporte
    usage: /tpaccept [jugador]
    aliases: [tpyes]
    permission: etccore.tpa
  tpdeny:
    description: Rechaza una solicitud de teletransporte
    usage: /tpdeny [jugador]
    aliases: [tpdecline, tpno]
    permission: etccore.tpa
  tpignore:
    description: Ignora solicitudes de teletransporte de un jugador
    usage: /tpignore <jugador>
    permission: etccore.tpa
  # /menu se registra dinamicamente desde commands/menu.yml

permissions:
  etccore.admin:
    description: Permite recargar la configuración del plugin
    default: op
  etccore.menu:
    description: Permite abrir el menú principal con /menu
    default: true
  etccore.menu.bypass:
    description: Ve mundos y pocketworlds aunque estén marcados como ocultos o privados
    default: op
  etccore.staff:
    description: Marca al jugador como staff. Usado por %etccore_staffonline% de PlaceholderAPI.
    default: op
  etccore.vanish:
    description: Permite usar /vanish y ver jugadores en vanish en el TAB.
    default: op
  etccore.enderchest:
    description: Permite abrir tu propio enderchest con /enderchest
    default: true
  etccore.enderchest.others:
    description: Permite ver el enderchest de otros jugadores con /enderchest <jugador>
    default: op
  etccore.invsee:
    description: Permite ver inventarios de jugadores online con /invsee
    default: op
  etccore.invsee.offline:
    description: Permite ver inventarios de jugadores offline con /invsee
    default: op
  etccore.build:
    description: Permite colocar y romper bloques. Asigna este nodo al grupo aprobado.
    default: op
  etccore.build.bypass:
    description: Ignora completamente la protección de construcción (admins, staff).
    default: op
  etccore.items:
    description: Permite tirar y recoger ítems del suelo.
    default: op
  etccore.chat:
    description: Permite enviar mensajes al chat. Deniega con LP para silenciar por permiso.
    default: true
  etccore.mute:
    description: Permite silenciar y dessilenciar jugadores con /mute y /unmute.
    default: op
  etccore.cmdblock.bypass:
    description: Ignora todas las reglas de blocked-commands.yml (admins, staff).
    default: op
  etccore.home:
    description: Permite usar /home, /homes y /homelist.
    default: true
  etccore.sethome:
    description: Permite usar /sethome y /edithome.
    default: true
  etccore.delhome:
    description: Permite usar /delhome.
    default: true
  etccore.publichome:
    description: Permite usar /publichome y /publichomelist.
    default: true
  etccore.warp:
    description: Permite usar /warp, /warps y /warplist.
    default: true
  etccore.warp.manage:
    description: Permite crear, editar y borrar warps.
    default: op
  etccore.lobby:
    description: Permite usar /lobby.
    default: true
  etccore.lobby.set:
    description: Permite definir el lobby.
    default: op
  etccore.spawn:
    description: Permite usar /spawn.
    default: true
  etccore.spawn.set:
    description: Permite definir el spawn.
    default: op
  etccore.back:
    description: Permite volver a la última ubicación guardada.
    default: true
  etccore.reborn:
    description: Permite volver a una muerte guardada y ver la lista.
    default: true
  etccore.rtp:
    description: Permite usar /rtp.
    default: true
  etccore.tpa:
    description: Permite usar solicitudes de teletransporte.
    default: true
  etccore.tpaall:
    description: Permite solicitar a todos que vayan hacia ti.
    default: op
  etccore.tpadmin:
    description: Permite usar /tp, /tpo, /tpall, /tphere, /tpohere y /tpoffline.
    default: op
  etccore.teleport.warmup.bypass:
    description: Ignora los warmups de teletransporte.
    default: op
  etccore.teleport.cooldown.bypass:
    description: Ignora los cooldowns de teletransporte.
    default: op

