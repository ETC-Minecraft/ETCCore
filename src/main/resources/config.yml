# ============================================================
#   ETCCore — config.yml
# ============================================================
#
# Muestra logs al registrar/desregistrar comandos (default: false)
verbose-outputs: false

# Recarga automáticamente los archivos de commands/ cuando detecta cambios (default: true)
auto-reload: true

# ────────────────────────────
# Acciones al entrar (legacy)
# ────────────────────────────
# Formato antiguo, se mantiene por compatibilidad.
# Si defines join-rules más abajo, usa eso y puedes ignorar esta sección.
# Usa el mismo formato de acciones que los comandos YAML, por ejemplo:
#   - "[CONSOLE] lobby {player}"
#   - "[MESSAGE] &aBienvenido al servidor"
#
# only-groups: si se define, solo aplica a jugadores que pertenezcan a
# alguno de esos grupos de LuckPerms. Ejemplo: ["default"]
# always-actions: se ejecutan en cada entrada.
# first-join-actions: se ejecutan solo la primera vez real que el jugador entra.
on-join:
  enabled: false
  only-groups: []
  always-actions: []
  first-join-actions:
    - "[CONSOLE] lobby {player}"
    - "[MESSAGE] &aBienvenido, esta es tu primera vez en el servidor."

# ────────────────────────────
# Reglas múltiples al entrar
# ────────────────────────────
# Sistema recomendado para definir varias reglas independientes.
# Puedes combinar grupos, permisos, mundos y frecuencia de ejecución.
#
# Campos opcionales por regla:
#   enabled: true/false
#   only-groups: ["default", "vip"]
#   excluded-groups: ["staff"]
#   only-permissions: ["grupo.terricolas"]
#   excluded-permissions: ["etccore.admin"]
#   only-worlds: ["world"]
#   excluded-worlds: ["eventos"]
#   cooldown-seconds: 300     # no vuelve a correr hasta pasados 300s
#   once-per-day: true        # se ejecuta como máximo una vez al día por jugador
#   delay-ticks: 20           # retrasa la ejecución 20 ticks
#   always-actions: []        # siempre que entra y cumpla filtros/frecuencia
#   first-join-actions: []    # solo la primera vez real que entra
join-rules:
  default-lobby:
    enabled: true
    only-groups: ["default"]
    always-actions:
      - "[CONSOLE] lobby {player}"
    first-join-actions:
      - "[MESSAGE] &aBienvenido Ente, esta es tu primera vez en el servidor."

  terricolas-pan:
    enabled: true
    only-groups: ["terricolas"]
    cooldown-seconds: 30
    always-actions:
      - "[CONSOLE] give {player} bread 1"
    first-join-actions: []

  kit-diario-default:
    enabled: false
    only-groups: ["default"]
    once-per-day: true
    delay-ticks: 40
    always-actions:
      - "[MESSAGE] &eTu recompensa diaria ha sido entregada."
      - "[CONSOLE] give {player} apple 3"
    first-join-actions: []

  vip-spawn:
    enabled: false
    only-groups: ["vip", "vip+"]
    excluded-groups: ["staff"]
    only-worlds: ["world"]
    always-actions:
      - "[CONSOLE] spawn {player}"
    first-join-actions: []

# ────────────────────────────
# Update checker
# ────────────────────────────
# Verifica si hay una versión nueva en GitHub al iniciar el servidor.
# Solo notifica a jugadores con etccore.admin al unirse. Nunca molesta a jugadores normales.
update-checker: true

# ────────────────────────────
# Logging de comandos
# ────────────────────────────
# Registra cada ejecución de un comando YAML en plugins/ETCCore/logs/commands.log
# Útil para auditoría. Impacto mínimo (escritura asíncrona).
log-commands: false

# ────────────────────────────
# Protección de construcción
# ────────────────────────────
# Activa el sistema que bloquea colocar/romper bloques a jugadores sin etccore.build.
# true  = activo (recomendado para servidores con grupo default sin acceso)
# false = desactivado (usa otro plugin para gestionar esto)
build-protection: true

# Mensaje que recibe el jugador cuando intenta construir sin permiso.
# Soporta códigos de color &. Se muestra en la barra de acción (sobre el hotbar).
build-protection-message: "&cNecesitas ser aprobado para construir o romper bloques."

# ────────────────────────────
# Protección de ítems
# ────────────────────────────
# Activa el sistema que bloquea tirar y recoger ítems a jugadores sin etccore.items.
item-protection: true

# Mensaje en la action bar cuando el jugador intenta tirar un ítem sin permiso.
item-protection-message: "&cNo puedes tirar objetos aquí."

# ────────────────────────────
# Sistema de mute
# ────────────────────────────
# Razón que se muestra cuando se usa /mute sin especificar una.
mute-default-reason: "Violación de las normas del servidor"

# El formato del chat se configura en chat-format.yml
